<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1><b>Informações Pessoais</b></h1>

    <form action="Menu.html" method="get">
        <fieldset>
            <legend>Cadastro do Cliente</legend>
        <p>
            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite o nome do cliente">
            </div>
        </p>

        <p>
            <div>
                <label for="idade">Idade: </label>
                <input type="number" id="idade" name="idade" placeholder="Digite a idade">
            </div>
        </p>

        <p>
            <div>
                <label for="endereço">Endereço:</label>
                <input type="text" id="endereço" name="endereço" placeholder="Digite o endereço">
            </div>
        </p>

        <p>
            <div>
                <label for="cidade">Cidade: </label>
                <input type="text" id="cidade" name="cidade" placeholder="Digite a cidade">
            </div>
        </p>

        <p>
            <div>
                <label for="estado">Estado: </label>
                <input type="text" id="estado" name="estado" placeholder="UF">
            </div>
        </p>

        <p>
            <div>
                <label for="cep">CEP: </label>
                <input type="number" id="cep" name="cep" placeholder="XXXXX-XXX">
            </div>
        </p>

        <p>
            <div>
                <label for="telR">Tel/Res: </label>
                <input type="number" id="telR" name="telR" placeholder="99 99999-9999">
            </div>
        </p>

        <p>
            <div>
                <label for="telC">Tel/Cel: </label>
                <input type="number" id="telC" name="telC" placeholder="99 99999-9999">
            </div>
        </p>

        <p>
            <div>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="Digite o endereço de email">
            </div>
        </p>
        </fieldset>

        <input type="submit" value="Enviar">
    </form>
</body>
</html>
